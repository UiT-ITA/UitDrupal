name: Build and Push Docker Image to drupal test

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        type: string
      tag_name:
        description: 'Docker image tag name'
        required: true
        type: string

jobs:
  update-image-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Update Drupal image tag
        run: |
          sed -i 's|image: uitcontainerregistry.azurecr.io/uit/drupal:.*|image: uitcontainerregistry.azurecr.io/uit/drupal:${{ github.event.inputs.tag_name }}|' bgo1-test/espen-test/drupal-deployment.yaml

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changes
        run: |
          git add bgo1-test/espen-test/drupal-deployment.yaml
          if git diff --staged --quiet; then
            echo "No changes detected - tag ${{ github.event.inputs.tag_name }} is already set"
            echo "CHANGES_MADE=false" >> $GITHUB_ENV
          else
            git commit -m "Drupal image tag updated for test server: ${{ github.event.inputs.tag_name }}"
            echo "CHANGES_MADE=true" >> $GITHUB_ENV
          fi

      - name: Push changes
        if: env.CHANGES_MADE == 'true'
        run: |
          git push origin master

