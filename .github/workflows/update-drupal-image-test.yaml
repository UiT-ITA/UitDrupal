# This workflow updates the Drupal Docker image tag in the test deployment file.
# It is triggered manually via workflow_dispatch with the desired tag name.
# The workflow will:
#   1. Check out the repository
#   2. Update the image tag in bgo1-test/uit-web-test/drupal-deployment.yaml
#   3. Commit and push the changes (only if the tag was actually changed)
#   4. Skip commit/push if the tag is already set (graceful idempotent behavior)
# The workflow will be called by workflow in project https://github.com/UiT-ITA/docker-image-drupal-unprivileged
# everytime a new image is pushed to the registry. When commit is pushed to master branch
# flux at the kubernetes cluster will automatically deploy the new image.

name: Build and Push Docker Image to drupal test

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        type: string
      tag_name:
        description: 'Docker image tag name'
        required: true
        type: string

jobs:
  update-image-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Debug input variables
        run: |
          echo "Input variables:"
          echo "  tag_name: ${{ github.event.inputs.tag_name }}"
          echo "  reason: ${{ github.event.inputs.reason }}"

      - name: Validate tag_name input
        run: |
          # Only allow alphanumeric, dots, dashes, and underscores
          if ! [[ "${{ github.event.inputs.tag_name }}" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "ERROR: tag_name contains invalid characters."
            exit 1
          fi

      - name: Update Drupal image tag
        run: |
          # Use validated tag_name
          sed -i "s|image: uitcontainerregistry.azurecr.io/uit/drupal:.*|image: uitcontainerregistry.azurecr.io/uit/drupal:${{ github.event.inputs.tag_name }}|" bgo1-test/uit-web-test/drupal-deployment.yaml

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changes
        run: |
          git add bgo1-test/uit-web-test/drupal-deployment.yaml
          if git diff --staged --quiet; then
            echo "No changes detected - tag ${{ github.event.inputs.tag_name }} is already set"
            echo "CHANGES_MADE=false" >> $GITHUB_ENV
          else
            git commit -m "Drupal image tag updated for test server: ${{ github.event.inputs.tag_name }}"
            echo "CHANGES_MADE=true" >> $GITHUB_ENV
          fi

      - name: Push changes
        if: env.CHANGES_MADE == 'true'
        run: |
          git push origin master

