apiVersion: apps/v1
kind: Deployment
metadata:
  name: drupal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: drupal
  template:
    metadata:
      labels:
        app: drupal
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 33
        runAsGroup: 33
        fsGroup: 33
      containers:
      - name: drupal
        env:
          # Application configuration
          - name: POSTGRES_DB
            value: ${app_name}
          - name: POSTGRES_HOST
            value: ${app_name}-db-rw
          - name: POSTGRES_PORT
            value: "5432"
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: ${app_name}-db-secret
                key: username
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: ${app_name}-db-secret
                key: password          
          - name: DRUPAL_SITE_NAME
            value: "Uit Drupal test Site"
          - name: DRUPAL_SITE_ENVIRONMENT
            value: "test"
          - name: DRUPAL_ADMIN_USERNAME
            valueFrom:
              secretKeyRef:
                name: ${app_name}-drupal-adminuser-secret
                key: username
          - name: DRUPAL_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: ${app_name}-drupal-adminuser-secret
                key: password
          - name: UIT_ORGREG_APIKEY
            valueFrom:
              secretKeyRef:
                name: ${app_name}-drupal-orgreg-apikey-secret
                key: password
          - name: UIT_FS_UTVEKSLINGSAVTALER_APIKEY
            valueFrom:
              secretKeyRef:
                name: ${app_name}-drupal-fs-utvekslingsavtaler-apikey-secret
                key: password
          - name: UIT_IKNOWBASE_GRAPHQL_STUDIEKATALOG_APIKEY
            valueFrom:
              secretKeyRef:
                name: ${app_name}-drupal-iknowbase-graphql-studiekatalog-secret
                key: password
          - name: DRUPAL_REST_BASEURL
            value: "https://uit-web-test-ddev.bgo1.test.rail.uib.no"
          - name: DRUPAL_REST_USERNAME
            valueFrom:
              secretKeyRef:
                name: ${app_name}-drupal-restuser-secret
                key: username
          - name: DRUPAL_REST_PASSWORD
            valueFrom:
              secretKeyRef:
                name: ${app_name}-drupal-restuser-secret
                key: password
          - name: ENABLE_ENTRYPOINT_D
            value: "1"
          - name: IMPORT_STUDIEPROGRAM_TEST_DATA
            value: "0"
          - name: STUDIEPROGRAM_TEST_DATA_PATH
            value: "/opt/uit_assets/test_data/all_studieprogram_nor_and_eng.json"
          - name: DATALOAD_ENABLED
            value: "0"
          - name: USER_CREATE_ENABLED
            value: "1"
          - name: APPLY_DRUPAL_CONFIG
            value: "1"
          - name: APPLY_DRUPAL_ENABLE_MODULES
            value: "0"
          - name: DRUPAL_SITE_UUID
            value: "7cc673db-76ad-414f-923d-644b3c6f4045"
          - name: DRUPAL_INSTALL_METHOD
            value: "dbdump"
          - name: DRUPAL_DEFAULT_LANGUAGE
            value: "nb"
          - name: DBDUMP_FILENAME
            value: "ddev_drupal_template_for_dev_0002.sql.gz"
          - name: DB_EXPORT_BLOB_STORAGE_SECRET
            valueFrom:
              secretKeyRef:
                name: ${app_name}-secret-dbdump-blob
                key: password
          - name: DB_EXPORTS_DIR
            value: /tmp
        image: uitcontainerregistry.azurecr.io/uit/drupal:11.3-0072
        volumeMounts: 
          - name: settings-php
            mountPath: /var/www/html/web/sites/default/settings.php
            subPath: settings.php
          - name: drupal-default-files-test
            mountPath: /var/www/html/web/sites/default/files          
        ports:
          - containerPort: 9000        
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          seccompProfile:
            type:
              RuntimeDefault
      volumes: 
        - name: settings-php
          configMap:
            name: settings-php
        - name: drupal-default-files-test
          persistentVolumeClaim: 
            claimName: drupal-default-files-test
      imagePullSecrets:
      - name: ${image_pull_secret_name}      

